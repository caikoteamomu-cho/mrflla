<!-- Mismo HEAD y estilo base -->
<style>
/* ===== ALBUM DESLIZABLE ===== */
#album{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:#ff4d6d;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:500px;
    max-height:80vh; /* altura máxima del album */
    overflow-y:auto;  /* permite scroll vertical */
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.galeria{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:15px;
}

.galeria img{
    width:100%;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

.galeria img:hover{
    transform:scale(1.05);
}

/* VISOR DE IMAGEN GRANDE */
#visor{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
}

#visor img{
    max-width:80%;
    max-height:80%;
    border-radius:20px;
}

/* BOTÓN DE CERRAR GRANDE */
.cerrar{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:25px;  /* más grande */
    font-weight:bold;
    background:white;
    border-radius:50%;
    width:35px;
    height:35px;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
